<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Atlas AI">
  <title>Atlas AI</title>
  <!-- Sphere (Atlas) -->
  <circle cx="75" cy="100" r="50" fill="none" stroke="#2b6cb0" stroke-width="2"/>
  <ellipse cx="75" cy="100" rx="50" ry="14" fill="none" stroke="#2b6cb0" stroke-width="1" opacity="0.7"/>
  <ellipse cx="75" cy="100" rx="14" ry="50" fill="none" stroke="#2b6cb0" stroke-width="1" opacity="0.7"/>
  <!-- Tether -->
  <line x1="125" y1="100" x2="134" y2="90" stroke="#1a2340" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.55"/>
  <!-- Apple (Eris) -->
  <circle cx="150" cy="90" r="16" fill="#c38a00"/>
  <path d="M 148 76 Q 149 70 153 72" fill="none" stroke="#6b3a00" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 156 72 Q 164 68 166 76 Q 160 78 156 72 Z" fill="#15803d" opacity="0.95"/>
</svg>
