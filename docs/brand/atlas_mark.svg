<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Atlas AI">
  <title>Atlas AI</title>
  <!-- Sphere (Atlas) -->
  <circle cx="75" cy="100" r="50" fill="none" stroke="#4a9eff" stroke-width="2"/>
  <ellipse cx="75" cy="100" rx="50" ry="14" fill="none" stroke="#63b3ed" stroke-width="1" opacity="0.6"/>
  <ellipse cx="75" cy="100" rx="14" ry="50" fill="none" stroke="#63b3ed" stroke-width="1" opacity="0.6"/>
  <!-- Tether -->
  <line x1="125" y1="100" x2="134" y2="90" stroke="#e0e6f0" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.55"/>
  <!-- Apple (Eris) -->
  <circle cx="150" cy="90" r="16" fill="#f5c147"/>
  <path d="M 148 76 Q 149 70 153 72" fill="none" stroke="#f5c147" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M 156 72 Q 164 68 166 76 Q 160 78 156 72 Z" fill="#4ade80" opacity="0.9"/>
</svg>
